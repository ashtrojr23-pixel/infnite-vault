        const extraBases = [

        const allBases = baseFragrances.concat(extraBases); // now ~95-100

        // possible strengths
        const strengths = ["Eau de Toilette", "Eau de Parfum", "Extrait de Parfum", "Eau de Cologne"];

        const flankerSuffixes = ["", " Sport", " Fraîche", " Intense", " Extreme", " Absolu", " Noir", " L'Eau", " Parfum", " Cologne", " Édition", " Night", " Wood", " Leather", " Vetiver"];

        // Build final perfumes array (target >1000)
        const perfumes = [];
        let id = 0;

        // For each base, create multiple variations: different strengths + flanker suffixes
        allBases.forEach(base => {
            // how many variations per base? we want total >1000, with ~100 bases, need ~10 each.
            // Use 4 strengths and random selection of 2-3 suffixes
            const suffixesToUse = flankerSuffixes.slice(0, 8); // take first 8 (including empty)
            suffixesToUse.forEach(suffix => {
                strengths.forEach((strength, idx) => {
                    // Only add if not all combinations, but we want quantity. We'll add all combos for first 6 suffixes, then skip some to keep realistic.
                    // To reach 1000, we need around 100*4*3 = 1200, so we'll use 3-4 suffixes per base.
                    if (suffix === "" && idx < 4) { // always add base name with each strength
                        perfumes.push({
                            id: id++,
                            name: base.name + (suffix ? " " + suffix.trim() : ""),
                            scent: base.scent === "leather" ? "oriental" : base.scent, // map leather to oriental for filtering
                            strength: strength,
                            color: base.baseColor
                        });
                    } else if (suffix !== "" && idx < 3) { // add flankers with only EDT/EDP
                        // randomly decide to include this combo (to avoid over-generating, but we want many)
                        if (Math.random() > 0.3) {
                            perfumes.push({
                                id: id++,
                                name: base.name + (suffix ? " " + suffix.trim() : ""),
                                scent: base.scent === "leather" ? "oriental" : base.scent,
                                strength: strength,
                                color: base.baseColor === "blue" ? (Math.random()>0.5 ? "mint" : "blue") : base.baseColor // slight color variation
                            });
                        }
                    }
                });
            });

            const base = allBases[Math.floor(Math.random() * allBases.length)];

                id: id++,
                name: base.name + " " + (Math.floor(Math.random()*100)+1),
                scent: base.scent === "leather" ? "oriental" : base.scent,
                strength: strengths[Math.floor(Math.random() * strengths.length)],
                color: base.baseColor
            });
        }

        const finalPerfumes = perfumes.slice(0, 1080);
        console.log(`Generated ${finalPerfumes.length} fragrances`);

        // ---------- FILTERING LOGIC ----------
        const grid = document.getElementById('perfumeGrid');
        const totalSpan = document.getElementById('totalCount');
        const displayedSpan = document.getElementById('displayedCount');

        let activeScent = 'all';
        let activeStrength = 'all';
        let activeColor = 'all';

        // UI elements
        const scentFilters = document.querySelectorAll('[data-filter="scent"]');
        const colorFilters = document.querySelectorAll('[data-filter="color"]');
        const strengthBtns = document.querySelectorAll('[data-strength]');
        const resetBtn = document.getElementById('resetFilters');

        function setActiveScent(value) {
            scentFilters.forEach(btn => btn.classList.toggle('active', btn.dataset.value === value));
        }
        function setActiveColor(value) {
            colorFilters.forEach(btn => btn.classList.toggle('active', btn.dataset.value === value));
        }
        function setActiveStrength(value) {
            strengthBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.strength === value));
        }

        function renderGrid() {
            const filtered = finalPerfumes.filter(p => {
                if (activeScent !== 'all' && p.scent !== activeScent) return false;
                if (activeStrength !== 'all' && p.strength !== activeStrength) return false;
                if (activeColor !== 'all' && p.color !== activeColor) return false;
                return true;
            });

            totalSpan.textContent = finalPerfumes.length;
            displayedSpan.textContent = filtered.length;

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="no-results">✨ no fragrances match the current filters · adjust to explore ashraf's vault</div>`;
                return;
            }

            let html = '';
            filtered.forEach(p => {
                let strengthClass = '';
                if (p.strength.includes('Extrait')) strengthClass = 'strength-parfum';
                else if (p.strength.includes('Eau de Parfum')) strengthClass = 'strength-eau-de-parfum';
                else if (p.strength.includes('Eau de Toilette')) strengthClass = 'strength-eau-de-toilette';
                else if (p.strength.includes('Eau de Cologne')) strengthClass = 'strength-eau-de-cologne';

                const colorDotClass = p.color.replace(' ', '\\ ');
                html += `
                    <div class="perfume-card" data-color="${p.color}">
                        <div class="perfume-name">${p.name}</div>
                        <div class="perfume-desc">
                            <span class="scent-family">${p.scent}</span>
                            <span class="strength-indicator ${strengthClass}">${p.strength}</span>
                        </div>
                        <div class="card-footer">
                            <span class="color-dot ${colorDotClass}"></span> ${p.color}
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        // event listeners
        scentFilters.forEach(btn => {
            btn.addEventListener('click', () => {
                activeScent = btn.dataset.value;
                setActiveScent(activeScent);
                renderGrid();
            });
        });

        colorFilters.forEach(btn => {
            btn.addEventListener('click', () => {
                activeColor = btn.dataset.value;
                setActiveColor(activeColor);
                renderGrid();
            });
        });

        strengthBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                activeStrength = btn.dataset.strength;
                setActiveStrength(activeStrength);
                renderGrid();
            });
        });

        resetBtn.addEventListener('click', () => {
            activeScent = 'all';
            activeStrength = 'all';
            activeColor = 'all';
            setActiveScent('all');
            setActiveStrength('all');
            setActiveColor('all');
            renderGrid();
        });

        // initial render
        renderGrid();
    })();
</script>
</body>
</html>
