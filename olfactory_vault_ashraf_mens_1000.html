*{box-sizing:border-box;margin:0;padding:0;}
#vault{background:var(--navy);min-height:100vh;font-family:'Montserrat',sans-serif;color:var(--text-primary);padding-bottom:60px;}
.vault-header{text-align:center;padding:44px 24px 28px;border-bottom:1px solid var(--border);background:#060e1d;}
.vault-eyebrow{font-size:10px;font-weight:500;letter-spacing:.35em;color:var(--gold);text-transform:uppercase;margin-bottom:14px;}
.vault-title{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,5vw,50px);font-weight:300;color:var(--text-primary);line-height:1.1;letter-spacing:.02em;}
.vault-title em{font-style:italic;color:var(--mint-light);}
.vault-subtitle{font-size:11px;letter-spacing:.2em;color:var(--text-muted);margin-top:8px;text-transform:uppercase;}
.vault-count{display:inline-block;margin-top:16px;padding:5px 18px;border:1px solid rgba(201,169,110,.3);font-size:11px;letter-spacing:.12em;color:var(--gold-light);}
.controls{padding:16px 16px 10px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center;position:sticky;top:0;z-index:100;background:rgba(10,22,40,.97);border-bottom:1px solid var(--border);}
.filter-label{font-size:9px;letter-spacing:.2em;color:var(--text-muted);text-transform:uppercase;align-self:center;}
.filter-group{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;align-items:center;}
.btn{background:transparent;border:1px solid var(--border);color:var(--text-secondary);font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:.1em;padding:5px 11px;cursor:pointer;transition:all .2s;text-transform:uppercase;border-radius:2px;}
.btn:hover{border-color:var(--mint);color:var(--mint);}
.btn.active{background:var(--mid-blue);border-color:var(--mint);color:var(--mint-light);}
.btn.cp.active{background:rgba(30,10,60,.6);border-color:#9b7fd4;color:#c9b2e8;}
.btn.cedp.active{background:rgba(10,50,60,.6);border-color:var(--mint);color:var(--mint-light);}
.btn.cedt.active{background:rgba(10,40,50,.6);border-color:#7ab8d4;color:#aad4e8;}
.btn.cedc.active{background:rgba(10,50,30,.6);border-color:var(--sage);color:var(--sage-light);}
.search-box{background:rgba(26,58,92,.3);border:1px solid var(--border);color:var(--text-primary);font-family:'Montserrat',sans-serif;font-size:11px;padding:6px 12px;width:190px;letter-spacing:.04em;border-radius:2px;outline:none;}
.search-box:focus{border-color:var(--mint);}
.search-box::placeholder{color:var(--text-muted);}
.sort-select{background:rgba(26,58,92,.3);border:1px solid var(--border);color:var(--text-secondary);font-family:'Montserrat',sans-serif;font-size:9px;padding:6px 8px;cursor:pointer;letter-spacing:.06em;border-radius:2px;outline:none;}
.stats-bar{display:flex;justify-content:center;gap:28px;padding:14px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.stat-item{text-align:center;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--mint-light);display:block;}
.stat-lbl{font-size:9px;letter-spacing:.12em;color:var(--text-muted);text-transform:uppercase;}
.section-header{display:flex;align-items:center;gap:14px;padding:24px 20px 10px;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;font-style:italic;color:var(--text-primary);white-space:nowrap;}
.section-line{flex:1;height:1px;background:var(--border);}
.section-count{font-size:9px;letter-spacing:.1em;color:var(--text-muted);white-space:nowrap;}
.perfume-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1px;padding:0 14px;}
.pc{background:var(--card-bg);border:1px solid var(--border);padding:15px 14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.pc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .2s;}
.pc:hover{background:rgba(26,58,92,.5);}
.pc:hover::before{opacity:1;}
.cc-p::before{background:linear-gradient(90deg,var(--gold),transparent);}
.cc-edp::before{background:linear-gradient(90deg,#9b7fd4,transparent);}
.cc-edt::before{background:linear-gradient(90deg,var(--mint),transparent);}
.cc-edc::before{background:linear-gradient(90deg,var(--sage),transparent);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.cbadge{font-size:8px;letter-spacing:.1em;padding:2px 7px;border-radius:1px;text-transform:uppercase;font-weight:500;}
.bp{background:rgba(201,169,110,.15);color:var(--gold);border:1px solid rgba(201,169,110,.3);}
.bedp{background:rgba(155,127,212,.15);color:#c9b2e8;border:1px solid rgba(155,127,212,.3);}
.bedt{background:rgba(126,200,192,.15);color:var(--mint);border:1px solid rgba(126,200,192,.3);}
.bedc{background:rgba(107,143,113,.15);color:var(--sage-light);border:1px solid rgba(107,143,113,.3);}
.fdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.pname{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:400;color:var(--text-primary);line-height:1.3;margin-bottom:3px;}
.phouse{font-size:9px;letter-spacing:.1em;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;}
.notes-row{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px;}
.ntag{font-size:8px;letter-spacing:.04em;color:var(--text-secondary);background:rgba(42,82,128,.2);border:1px solid rgba(42,82,128,.3);padding:2px 6px;border-radius:1px;}
.sbar{height:2px;background:rgba(42,82,128,.3);border-radius:1px;margin-top:8px;}
.sfill{height:100%;border-radius:1px;}
.sp{background:linear-gradient(90deg,var(--gold),#e8c87a);}
.sedp{background:linear-gradient(90deg,#9b7fd4,#c0a8e8);}
.sedt{background:linear-gradient(90deg,var(--mint),var(--mint-light));}
.sedc{background:linear-gradient(90deg,var(--sage),var(--sage-light));}
.slbl{font-size:8px;letter-spacing:.06em;color:var(--text-muted);text-align:right;margin-top:2px;text-transform:uppercase;}
.empty-msg{text-align:center;padding:60px 20px;color:var(--text-muted);font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;width:100%;}
.rc{font-size:10px;letter-spacing:.06em;color:var(--text-muted);padding:8px 22px 0;text-align:right;}
.legend{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:10px 20px;border-bottom:1px solid var(--border);}
.li{display:flex;align-items:center;gap:5px;font-size:9px;letter-spacing:.08em;color:var(--text-muted);text-transform:uppercase;}
.ldot{width:7px;height:7px;border-radius:50%;}

const PERF = P.map(r => ({name:r[0],house:r[1],conc:r[2],family:r[3],notes:r[4]}));

let aC='all', aF='all', aQ='', aS='name';

function fConc(v,b){aC=v;document.querySelectorAll('.btn[data-conc]').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();}
function fFam(v,b){aF=v;document.querySelectorAll('.btn[data-fam]').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();}

document.getElementById('search').addEventListener('input',e=>{aQ=e.target.value.toLowerCase();render();});
document.getElementById('sort-select').addEventListener('change',e=>{aS=e.target.value;render();});

function getFiltered(){
  return PERF.filter(p=>{
    if(aC!=='all'&&p.conc!==aC)return false;
    if(aF!=='all'&&p.family!==aF)return false;
    if(aQ&&!p.name.toLowerCase().includes(aQ)&&!p.house.toLowerCase().includes(aQ)&&!p.notes.some(n=>n.toLowerCase().includes(aQ)))return false;
    return true;
  });
}

function sortP(arr){
  return[...arr].sort((a,b)=>{
    if(aS==='name')return a.name.localeCompare(b.name);
    if(aS==='house')return a.house.localeCompare(b.house)||a.name.localeCompare(b.name);
    if(aS==='family')return a.family.localeCompare(b.family)||a.name.localeCompare(b.name);
    if(aS==='strength-desc')return ST[b.conc].p-ST[a.conc].p;
    if(aS==='strength-asc')return ST[a.conc].p-ST[b.conc].p;
    return 0;
  });
}

function cardHtml(p){
  const s=ST[p.conc];
  const fc=FC[p.family]||'#7ec8c0';
  return`<div class="pc cc-${s.c}">
    <div class="card-top"><span class="cbadge b${s.c}">${p.conc}</span><div class="fdot" style="background:${fc};"></div></div>
    <div class="pname">${p.name}</div>
    <div class="phouse">${p.house}</div>
    <div class="notes-row">${p.notes.map(n=>`<span class="ntag">${n}</span>`).join('')}</div>
    <div class="sbar"><div class="sfill s${s.c}" style="width:${s.p}%"></div></div>
    <div class="slbl">${s.l}</div>
  </div>`;
}

const CO=['Parfum','EDP','EDT','EDC'];
const CL2={Parfum:'Parfum — Pure Perfume',EDP:'Eau de Parfum',EDT:'Eau de Toilette',EDC:'Eau de Cologne'};

function render(){
  const filt=sortP(getFiltered());
  document.getElementById('rc').textContent=filt.length+' of '+PERF.length+' fragrances';
  const cc=document.getElementById('cc');
  if(!filt.length){cc.innerHTML='<div class="perfume-grid"><div class="empty-msg">No fragrances found</div></div>';updateStats([]);return;}

  if(aS==='strength-desc'||aS==='strength-asc'||aC!=='all'){
    const grps={};CO.forEach(c=>{grps[c]=[];});
    filt.forEach(p=>grps[p.conc].push(p));
    const ord=aS==='strength-asc'?[...CO].reverse():CO;
    let h='';
    ord.forEach(c=>{const it=grps[c];if(!it.length)return;h+=`<div><div class="section-header"><div class="section-title">${CL2[c]}</div><div class="section-line"></div><div class="section-count">${it.length} fragrances</div></div><div class="perfume-grid">${it.map(cardHtml).join('')}</div></div>`;});
    cc.innerHTML=h;
  } else if(aS==='family'){
    const grps={};Object.keys(FC).forEach(f=>{grps[f]=[];});
    filt.forEach(p=>{if(grps[p.family])grps[p.family].push(p);});
    let h='';
    Object.keys(FC).forEach(fam=>{const it=grps[fam];if(!it||!it.length)return;h+=`<div><div class="section-header"><div class="fdot" style="background:${FC[fam]};width:9px;height:9px;flex-shrink:0;"></div><div class="section-title">${fam}</div><div class="section-line"></div><div class="section-count">${it.length} fragrances</div></div><div class="perfume-grid">${it.map(cardHtml).join('')}</div></div>`;});
    cc.innerHTML=h;
  } else {
    cc.innerHTML=`<div style="margin-top:10px;"><div class="perfume-grid">${filt.map(cardHtml).join('')}</div></div>`;
  }
  updateStats(filt);
}

function updateStats(f){
  const cc2={};const fc2={};
  f.forEach(p=>{cc2[p.conc]=(cc2[p.conc]||0)+1;fc2[p.family]=(fc2[p.family]||0)+1;});
  const tf=Object.entries(fc2).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('stats-bar').innerHTML=`
    <div class="stat-item"><span class="stat-num">${f.length}</span><span class="stat-lbl">In Vault</span></div>
    <div class="stat-item"><span class="stat-num">${cc2['Parfum']||0}</span><span class="stat-lbl">Parfum</span></div>
    <div class="stat-item"><span class="stat-num">${cc2['EDP']||0}</span><span class="stat-lbl">EDP</span></div>
    <div class="stat-item"><span class="stat-num">${cc2['EDT']||0}</span><span class="stat-lbl">EDT</span></div>
    <div class="stat-item"><span class="stat-num">${cc2['EDC']||0}</span><span class="stat-lbl">EDC</span></div>
    <div class="stat-item"><span class="stat-num">${tf?tf[1]:0}</span><span class="stat-lbl">Top: ${tf?tf[0]:'—'}</span></div>
  `;
  document.getElementById('total-count').textContent=PERF.length+' masculine fragrances';
}

render();
</script>
